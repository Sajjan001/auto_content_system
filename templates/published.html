<!DOCTYPE html>
<html>
<head>
    <title>{{blog[1]}}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-light">

<div class="container mt-5">

    <a href="/" class="btn btn-secondary mb-4">
        ← Back
    </a>

    <div class="card shadow">

        <div class="card-body">

            <h1>
                {{blog[1]}}
            </h1>

            <hr>

            <h5>
                Topic : {{blog[2]}}
            </h5>

            <div style="margin: 1.5rem 0;">
                <img src="{{blog[4] if blog[4] else 'https://picsum.photos/800/400?random=' + blog[0]|string}}" alt="{{blog[1]}}" style="max-width: 100%; height: auto; border-radius: 8px;">
            </div>

            <br>

            <div>
                    {{ html_content|safe }}
            </div>

        </div>

    </div>

</div>

</body>
</html>
