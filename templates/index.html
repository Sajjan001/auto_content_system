<!DOCTYPE html>
<html>
<head>
    <title>AI Content Automation</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container">

        <span class="navbar-brand mb-0 h1">
            AI Content Automation System
        </span>

        <div>
            <button class="btn btn-warning me-2" data-bs-toggle="modal" data-bs-target="#schedulerModal">
                {% if automation_active %}
                Automation Running
                {% else %}
                Set Automation
                {% endif %}
            </button>

            <a href="/generate" class="btn btn-success">
                Generate New Blog
            </a>

        </div>

    </div>
</nav>

<div class="modal fade" id="schedulerModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Content Automation Scheduler</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form action="/schedule" method="POST" id="schedulerForm">
                    <div class="mb-3">
                        <label class="form-label">Topic</label>
                        <input type="text" name="topic" class="form-control" placeholder="AI, Finance, Healthcare, Sports">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Schedule</label>
                        <select name="schedule" class="form-select">
                            <option value="10sec">Every 10 Seconds</option>
                            <option value="1min">Every 1 Minute</option>
                            <option value="daily2pm">Daily 2 PM</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Start Automation</button>
                </form>

                {% if automation_active %}
                <form action="/revoke" method="POST" style="margin-top: 1rem;">
                    <button type="submit" class="btn btn-danger w-100">Stop Automation</button>
                </form>
                {% endif %}
            </div>
        </div>
    </div>
</div>

<div class="container mt-5">

    <h2 class="mb-4">
        Latest Published Articles
    </h2>

    <div class="row">

        {% for blog in blogs %}

        <div class="col-md-6 mb-4">

            <div class="card shadow-sm h-100 border-0">

                <img src="{{blog[4] if blog[4] else 'https://picsum.photos/800/400?random=' + blog[0]|string}}" alt="{{blog[1]}}" style="height: 200px; object-fit: cover; border-radius: 8px 8px 0 0;">

                <div class="card-body">

                    <h4 class="card-title">
                        {{blog[1]}}
                    </h4>

                    <a
                        href="/article/{{blog[0]}}"
                        class="btn btn-outline-primary"
                    >
                        Read Full Article
                    </a>

                </div>

            </div>

        </div>

        {% endfor %}

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

</body>
</html>
