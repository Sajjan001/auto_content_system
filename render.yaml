services:
  - type: web
    name: auto-content-system
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: GROQ_API_KEY
        scope: run
        value: ${GROQ_API_KEY}
      - key: DATABASE_URL
        fromDatabase:
          name: auto-content-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.9

databases:
  - name: auto-content-db
    plan: free
    region: oregon
